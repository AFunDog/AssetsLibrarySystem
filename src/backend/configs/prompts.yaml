#        * instruments
#        * style
#        * emotion
#     3. 每个字段都是对象，且必须包含：
#        * text：适合向量化的中文描述句
#        * tags：适合筛选和展示的中文标签数组
#     4. comprehensive 表示对当前音频素材的整体精简概括。
#     5. instruments 表示能明确听出的乐器、音源或主要声音元素。
#     6. style 表示音频的风格、速度、节奏、编曲和声音质感。
#     7. emotion 表示音频传达的情绪、氛围和听感。
#     8. text 应简洁准确，不要超过 80 个中文字符。
#     9. tags 中每个元素应为简短中文词组，不要写成长句。
#     10. 不要把文件名、路径、目录名中的词直接当作音频内容，除非音频本身也能支持该判断。
#     11. 不要输出重复、近义堆叠或过度细碎的标签。
